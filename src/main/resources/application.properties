quarkus.datasource.db-kind=mariadb
quarkus.datasource.username=${DB_USERNAME:cards}
quarkus.datasource.password=${DB_PASSWORD:cards}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:mariadb://localhost:3306/cards_api?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration

quarkus.jackson.property-naming-strategy=SNAKE_CASE

cards.webhooks.carrier.api-key=${CARRIER_WEBHOOK_API_KEY:carrier-local-key}
cards.webhooks.processor.api-key=${PROCESSOR_WEBHOOK_API_KEY:processor-local-key}
cards.processor.cvv.default-ttl-seconds=${CVV_DEFAULT_TTL_SECONDS:900}

quarkus.smallrye-openapi.path=/openapi

# OAuth2 + JWT com Keycloak
%prod.quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:quarkus}
quarkus.oidc.client-id=backend-service
quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET:secret}
quarkus.keycloak.devservices.realm-path=quarkus-realm.json

# Permissões: webhooks usam API Key, demais exigem JWT
quarkus.http.auth.permission.webhooks.paths=/webhooks/*
quarkus.http.auth.permission.webhooks.policy=permit
quarkus.http.auth.permission.openapi.paths=/openapi,/q/*
quarkus.http.auth.permission.openapi.policy=permit
quarkus.http.auth.permission.api.paths=/accounts,/accounts/*,/physical-cards,/physical-cards/*,/virtual-cards,/virtual-cards/*
quarkus.http.auth.permission.api.policy=authenticated
