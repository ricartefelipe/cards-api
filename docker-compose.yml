services:
  keycloak:
    image: quay.io/keycloak/keycloak:26
    container_name: cards-api-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./src/main/resources/quarkus-realm.json:/opt/keycloak/data/import/quarkus-realm.json
    command: start-dev --import-realm
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\n\\r\\n' >&3; if [ $? -eq 0 ]; then echo 'Healthcheck Successful'; exit 0; else echo 'Healthcheck Failed'; exit 1; fi"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  mysql:
    image: mariadb:10.11
    container_name: cards-api-mysql
    environment:
      MARIADB_DATABASE: cards_api
      MARIADB_USER: cards
      MARIADB_PASSWORD: cards
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
